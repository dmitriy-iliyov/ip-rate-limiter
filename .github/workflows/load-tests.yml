name: Load Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  load-test:
    runs-on: ubuntu-latest

    env:
      REDIS_HOST: rate-limiter-redis
      REDIS_PORT: 6379

    steps:
      - uses: actions/checkout@v3

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Cache Maven
        uses: actions/cache@v3
        with:
          path: ~/.m2
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Build application
        run: mvn clean package -DskipTests

      - name: Build Docker image
        run: docker build -t rate-limiter-example .

      - name: Start stack
        run: docker compose up -d

      - name: Wait for API
        run: |
          echo "Waiting for application to start..."
          for i in {1..30}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/api/test-ip-rate-limiter/guarded || true)
            if [[ "$STATUS" =~ ^(200|401|403)$ ]]; then
              echo "App is up ($STATUS)"
              exit 0
            fi
            echo "Attempt $i/30: HTTP $STATUS — retrying in 2s..."
            sleep 2
          done
          echo "Timed out waiting for application"
          docker compose logs
          exit 1

      - name: Run Gatling load tests
        run: mvn gatling:test -pl load-tests

      - name: Upload Gatling reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gatling-reports
          path: load-tests/target/gatling